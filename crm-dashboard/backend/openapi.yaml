          $ref: "#/components/schemas/CGF"

    CGFListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/CGF"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # CGF Member Schemas
    CGFMember:
      type: object
      properties:
