          type: boolean
          default: false

    CGFMemberUpdate:
      type: object
      properties:
        nama_cgf:
          type: string
        is_leader:
          type: boolean

    CGFMemberResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/CGFMember"

    CGFMemberListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
