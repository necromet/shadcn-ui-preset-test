openapi: 3.0.3
info:
  title: Church Management System API
  description: |
    API for managing church members, cell groups (CGF), attendance, ministries, and events.
    This API provides CRUD operations for all entities and dashboard analytics endpoints.
  version: 1.0.0
  contact:
    name: Church Admin
    email: admin@church.org
  license:
    name: MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.church.org/v1
    description: Production server

tags:
  - name: Members
    description: Church members management
  - name: CGF
    description: Cell Group Fellowship management
  - name: Attendance
    description: CGF attendance tracking
  - name: Ministry
    description: Ministry and service management
  - name: Events
    description: Event management
  - name: Analytics
    description: Dashboard analytics and reports
  - name: Status
    description: Member status history

security:
  - BearerAuth: []

paths:
  # ==================== MEMBERS ENDPOINTS ====================
  /members:
    get:
      tags: [Members]
      summary: Get all members
      description: Retrieve a paginated list of church members with optional filtering
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
        - name: search
          in: query
          description: Search by member name
          schema:
            type: string
            example: "John"
        - name: jenis_kelamin
          in: query
          description: Filter by gender
          schema:
            type: string
            enum: [Laki-laki, Perempuan]
        - name: kategori_domisili
          in: query
          description: Filter by domicile category
          schema:
            type: string
            example: "Jakarta"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
              example:
                success: true
                data:
                  - no_jemaat: 1
                    nama_jemaat: "John Doe"
                    jenis_kelamin: "Laki-laki"
                    tanggal_lahir: "1990-05-15"
                    tahun_lahir: 1990
                    bulan_lahir: 5
                    kuliah_kerja: "Software Engineer"
                    no_handphone: "081234567890"
                    ketertarikan_cgf: "Yes"
                    nama_cgf: "Grace CGF"
                    kategori_domisili: "Jakarta"
                    alamat_domisili: "Jl. Sudirman No. 123"
                pagination:
                  page: 1
                  limit: 10
                  total: 100
                  totalPages: 10
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Members]
      summary: Create a new member
      description: Register a new church member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberCreate"
            example:
              nama_jemaat: "Jane Smith"
              jenis_kelamin: "Perempuan"
              tanggal_lahir: "1995-08-20"
              tahun_lahir: 1995
              bulan_lahir: 8
              kuliah_kerja: "Designer"
              no_handphone: "081987654321"
              ketertarikan_cgf: "Yes"
              nama_cgf: "Faith CGF"
              kategori_domisili: "Bandung"
              alamat_domisili: "Jl. Asia Afrika No. 45"
      responses:
        "201":
          description: Member created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /members/{no_jemaat}:
    parameters:
      - $ref: "#/components/parameters/MemberId"
    get:
      tags: [Members]
      summary: Get member by ID
      description: Retrieve a single member by their member number
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      tags: [Members]
      summary: Update member
      description: Update all fields of a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Member updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Members]
      summary: Partially update member
      description: Update specific fields of a member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberPartialUpdate"
      responses:
        "200":
          description: Member updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Members]
      summary: Delete member
      description: Remove a member from the system
      responses:
        "200":
          description: Member deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== CGF ENDPOINTS ====================
  /cgf:
    get:
      tags: [CGF]
      summary: Get all CGF groups
      description: Retrieve all Cell Group Fellowship groups with optional filtering
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: hari
          in: query
          description: Filter by meeting day
          schema:
            type: string
            enum: [Senin, Selasa, Rabu, Kamis, Jumat, Sabtu, Minggu]
        - name: search
          in: query
          description: Search by CGF name or location
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFListResponse"
              example:
                success: true
                data:
                  - id: "CGF01"
                    nama_cgf: "Grace CGF"
                    lokasi_1: "Jakarta Selatan"
                    lokasi_2: "Bintaro"
                    hari: "Senin"
                pagination:
                  page: 1
                  limit: 10
                  total: 25
                  totalPages: 3

    post:
      tags: [CGF]
      summary: Create a new CGF group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CGFCreate"
      responses:
        "201":
          description: CGF created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cgf/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: CGF group ID (5 characters)
        schema:
          type: string
          minLength: 5
          maxLength: 5
          example: "CGF01"

    get:
      tags: [CGF]
      summary: Get CGF by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [CGF]
      summary: Update CGF group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CGFUpdate"
      responses:
        "200":
          description: CGF updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [CGF]
      summary: Delete CGF group
      responses:
        "200":
          description: CGF deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== CGF MEMBERS ENDPOINTS ====================
  /cgf/members:
    get:
      tags: [CGF]
      summary: Get all CGF member assignments
      description: Retrieve all member assignments to CGF groups
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: nama_cgf
          in: query
          description: Filter by CGF name
          schema:
            type: string
        - name: is_leader
          in: query
          description: Filter by leader status
          schema:
            type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFMemberListResponse"

    post:
      tags: [CGF]
      summary: Assign member to CGF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CGFMemberCreate"
      responses:
        "201":
          description: Member assigned to CGF successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFMemberResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /cgf/members/{no_jemaat}:
    parameters:
      - $ref: "#/components/parameters/MemberId"

    get:
      tags: [CGF]
      summary: Get CGF assignment by member ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFMemberResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [CGF]
      summary: Update CGF member assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CGFMemberUpdate"
      responses:
        "200":
          description: Assignment updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CGFMemberResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [CGF]
      summary: Remove member from CGF
      responses:
        "200":
          description: Member removed from CGF successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== ATTENDANCE ENDPOINTS ====================
  /attendance:
    get:
      tags: [Attendance]
      summary: Get all attendance records
      description: Retrieve attendance records with filtering options
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: no_jemaat
          in: query
          description: Filter by member ID
          schema:
            type: integer
        - name: cg_id
          in: query
          description: Filter by CGF ID
          schema:
            type: string
        - name: tanggal
          in: query
          description: Filter by date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: keterangan
          in: query
          description: Filter by attendance status
          schema:
            type: string
            enum: [hadir, izin, tidak_hadir, tamu]
        - name: start_date
          in: query
          description: Start date for date range filter
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: End date for date range filter
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceListResponse"
              example:
                success: true
                data:
                  - id: 1
                    no_jemaat: 1
                    cg_id: "CGF01"
                    tanggal: "2024-01-15"
                    keterangan: "hadir"
                    member:
                      nama_jemaat: "John Doe"
                pagination:
                  page: 1
                  limit: 10
                  total: 500
                  totalPages: 50

    post:
      tags: [Attendance]
      summary: Record attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceCreate"
      responses:
        "201":
          description: Attendance recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /attendance/bulk:
    post:
      tags: [Attendance]
      summary: Bulk record attendance
      description: Record attendance for multiple members at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cg_id, tanggal, records]
              properties:
                cg_id:
                  type: string
                  example: "CGF01"
                tanggal:
                  type: string
                  format: date
                  example: "2024-01-15"
                records:
                  type: array
                  items:
                    $ref: "#/components/schemas/AttendanceRecord"
                  example:
                    - no_jemaat: 1
                      keterangan: "hadir"
                    - no_jemaat: 2
                      keterangan: "izin"
      responses:
        "201":
          description: Bulk attendance recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attendance"
                  message:
                    type: string
                    example: "Attendance records created successfully"

  /attendance/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Attendance record ID
        schema:
          type: integer

    get:
      tags: [Attendance]
      summary: Get attendance record by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Attendance]
      summary: Update attendance record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdate"
      responses:
        "200":
          description: Attendance updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Attendance]
      summary: Delete attendance record
      responses:
        "200":
          description: Attendance deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== MINISTRY INFO ENDPOINTS ====================
  /ministry/types:
    get:
      tags: [Ministry]
      summary: Get all ministry types
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          description: Search by ministry name
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinistryListResponse"
              example:
                success: true
                data:
                  - pelayanan_id: "WL001"
                    nama_pelayanan: "Worship Leader"
                  - pelayanan_id: "SN001"
                    nama_pelayanan: "Singer"
                pagination:
                  page: 1
                  limit: 10
                  total: 10
                  totalPages: 1

    post:
      tags: [Ministry]
      summary: Create a new ministry type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MinistryCreate"
      responses:
        "201":
          description: Ministry created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinistryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ministry/types/{pelayanan_id}:
    parameters:
      - name: pelayanan_id
        in: path
        required: true
        description: Ministry ID (5 characters)
        schema:
          type: string
          minLength: 5
          maxLength: 5

    get:
      tags: [Ministry]
      summary: Get ministry by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinistryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Ministry]
      summary: Update ministry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MinistryUpdate"
      responses:
        "200":
          description: Ministry updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MinistryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Ministry]
      summary: Delete ministry
      responses:
        "200":
          description: Ministry deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== PELAYAN (MINISTRY MEMBERS) ENDPOINTS ====================
  /ministry/pelayan:
    get:
      tags: [Ministry]
      summary: Get all ministry members
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          description: Search by member name
          schema:
            type: string
        - name: role
          in: query
          description: Filter by specific ministry role
          schema:
            type: string
            enum:
              [
                is_worship_leader,
                is_singer,
                is_pianist,
                is_saxophone,
                is_filler,
                is_bass_guitarist,
                is_drummer,
                is_multimedia,
                is_sound,
                is_caringteam,
                is_connexion_crew,
                is_supporting_crew,
                is_cforce,
                is_cg_leader,
                is_community_pic,
              ]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PelayanListResponse"
              example:
                success: true
                data:
                  - no_jemaat: 1
                    nama_jemaat: "John Doe"
                    is_worship_leader: true
                    is_singer: true
                    is_pianist: false
                    is_saxophone: false
                    is_filler: false
                    is_bass_guitarist: false
                    is_drummer: false
                    is_multimedia: false
                    is_sound: false
                    is_caringteam: false
                    is_connexion_crew: false
                    is_supporting_crew: false
                    is_cforce: false
                    is_cg_leader: true
                    is_community_pic: false
                    is_others: false
                    total_pelayanan: 3
                pagination:
                  page: 1
                  limit: 10
                  total: 50
                  totalPages: 5

    post:
      tags: [Ministry]
      summary: Add ministry member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PelayanCreate"
      responses:
        "201":
          description: Ministry member added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PelayanResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /ministry/pelayan/{no_jemaat}:
    parameters:
      - $ref: "#/components/parameters/MemberId"

    get:
      tags: [Ministry]
      summary: Get ministry member by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PelayanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Ministry]
      summary: Update ministry member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PelayanUpdate"
      responses:
        "200":
          description: Ministry member updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PelayanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Ministry]
      summary: Partially update ministry member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PelayanPartialUpdate"
      responses:
        "200":
          description: Ministry member updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PelayanResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Ministry]
      summary: Remove ministry member
      responses:
        "200":
          description: Ministry member removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  # ==================== STATUS HISTORY ENDPOINTS ====================
  /status/status-history:
    get:
      tags: [Status]
      summary: Get all status history
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: no_jemaat
          in: query
          description: Filter by member ID
          schema:
            type: integer
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [Active, Inactive, Sabbatical, Moved]
        - name: start_date
          in: query
          description: Start date filter
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: End date filter
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusHistoryListResponse"

    post:
      tags: [Status]
      summary: Create status change record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusHistoryCreate"
      responses:
        "201":
          description: Status history created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusHistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /status/status-history/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [Status]
      summary: Get status history by ID
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusHistoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Status]
      summary: Update status history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusHistoryUpdate"
      responses:
        "200":
          description: Status history updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusHistoryResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Status]
      summary: Delete status history
      responses:
        "200":
          description: Status history deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
        "404":
          $ref: "#/components/responses/NotFound"

  /status/members/{no_jemaat}/status-history:
    parameters:
      - $ref: "#/components/parameters/MemberId"
    get:
      tags: [Status, Members]
      summary: Get status history for a member
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusHistoryListResponse"

  # ==================== EVENTS ENDPOINTS ====================
  /events:
    get:
      tags: [Events]
      summary: Get all events
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: search
          in: query
          description: Search by event name
          schema:
            type: string
        - name: category
          in: query
          description: Filter by event category
          schema:
            type: string
            enum: [Camp, Retreat, Quarterly, Monthly, Special, Workshop]
        - name: start_date
