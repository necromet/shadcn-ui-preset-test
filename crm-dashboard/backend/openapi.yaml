components:
  # ==================== SECURITY SCHEMAS ====================
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ==================== PARAMETERS ====================
  parameters:
    Page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    SortBy:
      name: sort_by
      in: query
      description: Field to sort by
      schema:
        type: string
        default: "created_at"

    SortOrder:
      name: sort_order
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: "desc"

    MemberId:
      name: no_jemaat
      in: path
      required: true
      description: Member number (primary key)
      schema:
        type: integer
        minimum: 1

  # ==================== RESPONSES ====================
  responses:
    BadRequest:
      description: Bad request - validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: 400
              message: "Validation error"
              details:
                - field: "nama_jemaat"
                  message: "Name is required"

    Unauthorized:
      description: Unauthorized - invalid or missing token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: 401
              message: "Unauthorized access"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: 404
              message: "Resource not found"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: 500
              message: "Internal server error"

  # ==================== SCHEMAS ====================
  schemas:
    # Common Schemas
    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: integer
              example: 400
            message:
              type: string
              example: "Error message"
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10

    # Member Schemas
    Member:
      type: object
      properties:
        no_jemaat:
          type: integer
          description: Member number (primary key)
          example: 1
        nama_jemaat:
          type: string
          example: "John Doe"
        jenis_kelamin:
          type: string
          enum: [Laki-laki, Perempuan]
          example: "Laki-laki"
        tanggal_lahir:
          type: string
          format: date
          example: "1990-05-15"
        tahun_lahir:
          type: integer
          example: 1990
        bulan_lahir:
          type: integer
          minimum: 1
          maximum: 12
          example: 5
        kuliah_kerja:
          type: string
          example: "Software Engineer"
        no_handphone:
          type: string
          example: "081234567890"
        ketertarikan_cgf:
          type: string
          example: "Yes"
        nama_cgf:
          type: string
          example: "Grace CGF"
        kategori_domisili:
          type: string
          example: "Jakarta"
        alamat_domisili:
          type: string
          example: "Jl. Sudirman No. 123"
        status_aktif:
          type: string
          example: "Active"
        status_keterangan:
          type: string
          example: "Status aktif"

    MemberCreate:
      type: object
      required: [nama_jemaat, jenis_kelamin, tanggal_lahir]
      properties:
        nama_jemaat:
          type: string
          minLength: 2
          example: "Jane Smith"
        jenis_kelamin:
          type: string
          enum: [Laki-laki, Perempuan]
        tanggal_lahir:
          type: string
          format: date
        tahun_lahir:
          type: integer
        bulan_lahir:
          type: integer
          minimum: 1
          maximum: 12
        kuliah_kerja:
          type: string
        no_handphone:
          type: string
        ketertarikan_cgf:
          type: string
        nama_cgf:
          type: string
        kategori_domisili:
          type: string
        alamat_domisili:
          type: string
        status_aktif:
          type: string
        status_keterangan:
          type: string

    MemberUpdate:
      type: object
      required: [nama_jemaat, jenis_kelamin, tanggal_lahir]
      properties:
        nama_jemaat:
          type: string
          minLength: 2
        jenis_kelamin:
          type: string
          enum: [Laki-laki, Perempuan]
        tanggal_lahir:
          type: string
          format: date
        tahun_lahir:
          type: integer
        bulan_lahir:
          type: integer
          minimum: 1
          maximum: 12
        kuliah_kerja:
          type: string
        no_handphone:
          type: string
        ketertarikan_cgf:
          type: string
        nama_cgf:
          type: string
        kategori_domisili:
          type: string
        alamat_domisili:
          type: string
        status_aktif:
          type: string
        status_keterangan:
          type: string

    MemberPartialUpdate:
      type: object
      properties:
        nama_jemaat:
          type: string
          minLength: 2
        jenis_kelamin:
          type: string
          enum: [Laki-laki, Perempuan]
        tanggal_lahir:
          type: string
          format: date
        tahun_lahir:
          type: integer
        bulan_lahir:
          type: integer
          minimum: 1
          maximum: 12
        kuliah_kerja:
          type: string
        no_handphone:
          type: string
        ketertarikan_cgf:
          type: string
        nama_cgf:
          type: string
        kategori_domisili:
          type: string
        alamat_domisili:
          type: string
        status_aktif:
          type: string
        status_keterangan:
          type: string

    MemberResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Member"

    MemberListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # CGF Schemas
    CGF:
      type: object
      properties:
        id:
          type: string
          minLength: 5
          maxLength: 5
          example: "CGF01"
        nama_cgf:
          type: string
          example: "Grace CGF"
        lokasi_1:
          type: string
          example: "Jakarta Selatan"
        lokasi_2:
          type: string
          example: "Bintaro"
        hari:
          type: string
          enum: [Senin, Selasa, Rabu, Kamis, Jumat, Sabtu, Minggu]
          example: "Senin"

    CGFCreate:
      type: object
      required: [id, nama_cgf, lokasi_1, hari]
      properties:
        id:
          type: string
          minLength: 5
          maxLength: 5
        nama_cgf:
          type: string
        lokasi_1:
          type: string
        lokasi_2:
          type: string
        hari:
          type: string
          enum: [Senin, Selasa, Rabu, Kamis, Jumat, Sabtu, Minggu]

    CGFUpdate:
      type: object
      required: [nama_cgf, lokasi_1, hari]
      properties:
        nama_cgf:
          type: string
        lokasi_1:
          type: string
        lokasi_2:
          type: string
